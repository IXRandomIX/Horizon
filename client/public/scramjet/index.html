<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
                />
                <title>Horizon Browser</title>

                <link rel="shortcut icon" content="favicon.webp" />

                <!-- Run SW cleanup immediately before anything else loads -->
                <script>
                (async () => {
                        if (!navigator.serviceWorker) return;

                        // ── IDB PRE-CREATION (ROOT-CAUSE FIX) ──────────────────────────────────────
                        // scramjet.init() (called later from index.js) opens "$scramjet" IDB at
                        // version 1 WITH an upgrade handler that creates the required object stores.
                        // But the ScramjetServiceWorker constructor ALSO opens the same IDB at
                        // version 1 WITHOUT an upgrade handler.  If the SW constructor's open
                        // request wins the race (DB doesn't exist yet → upgradeneeded fires with
                        // no handler → stores are never created), then init()'s open at the same
                        // version 1 will NOT fire the upgrade again, leaving all stores absent.
                        // Every subsequent put/get throws "object store not found", init() rejects,
                        // and loadConfig() in the SW always returns null → proxy never works.
                        //
                        // Fix: open the DB here, with an upgrade handler, BEFORE we register the
                        // SW.  Because we await this promise, the SW is only registered after the
                        // stores exist, so the SW constructor's open always sees a populated DB.
                        await new Promise((resolve, reject) => {
                                const req = indexedDB.open("$scramjet", 1);
                                req.onupgradeneeded = (e) => {
                                        const db = e.target.result;
                                        for (const store of ["config", "cookies", "redirectTrackers", "referrerPolicies", "publicSuffixList"]) {
                                                if (!db.objectStoreNames.contains(store)) {
                                                        db.createObjectStore(store);
                                                }
                                        }
                                };
                                req.onsuccess = (e) => { e.target.result.close(); resolve(); };
                                req.onerror = () => resolve(); // non-fatal — init() will retry
                        });
                        // ───────────────────────────────────────────────────────────────────────────

                        // Unregister every old SW on every page load so stale ones never linger
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const r of regs) await r.unregister();
                        // Register fresh SW right now so it's active before form submit
                        const reg = await navigator.serviceWorker.register("./sw.js");
                        await new Promise((resolve) => {
                                const sw = reg.installing || reg.waiting || reg.active;
                                if (!sw || sw.state === "activated") { resolve(); return; }
                                sw.addEventListener("statechange", function fn() {
                                        if (sw.state === "activated") { sw.removeEventListener("statechange", fn); resolve(); }
                                });
                        });
                        if (!navigator.serviceWorker.controller) {
                                await new Promise((r) => navigator.serviceWorker.addEventListener("controllerchange", r, { once: true }));
                        }
                })();
                </script>

                <link rel="stylesheet" href="fonts.css" />
                <script src="/scram/scramjet.all.js"></script>
                <script src="/baremux/index.js"></script>
                
                <link rel="stylesheet" href="index.css" />
                <script src="register-sw.js" defer></script>
                <script src="search.js" defer></script>
                <script src="index.js" defer></script>
                <script src="loading.js" defer></script>
        </head>

        <body>
                <!-- Loading Screen -->
                <div id="loading-screen">
                        <div id="loading-content">
                                <p id="load-line1" class="load-line"></p>
                                <p id="load-line2" class="load-line"></p>
                                <p id="load-line3" class="load-line load-dots"></p>
                                <p id="load-line4" class="load-line load-launch"></p>
                        </div>
                </div>

                <!-- Main Content (hidden until loading done) -->
                <div class="center-wrapper" id="main-content" style="opacity:0;pointer-events:none;">
                        <h1 class="horizon-title">HORIZON BROWSER</h1>
                        <p class="horizon-subtitle">Before using this browser put duckduckgo.com in the search bar before starting, if it ever shows a scramjet error, press the reload button on the bottom a few times to get it working, not the refresh button on your computer</p>
                        <form id="sj-form" class="flex-center">
                                <input
                                        id="sj-search-engine"
                                        value="https://www.google.com/search?q=%s"
                                        type="hidden"
                                />
                                <div class="search-wrapper">
                                        <input id="sj-address" type="text" placeholder="Search because yes" />
                                </div>
                        </form>
                        <div class="desc left-margin">
                                <p id="sj-error"></p>
                                <pre id="sj-error-code"></pre>
                        </div>
                </div>

                <!-- Browser Nav Bar (shown when proxy iframe is active) -->
                <div id="sj-navbar" style="display:none;">
                        <button id="nav-back" title="Go back">&#8592;</button>
                        <button id="nav-forward" title="Go forward">&#8594;</button>
                        <button id="nav-reload" title="Reload">&#8635;</button>
                        <span id="nav-url"></span>
                        <button id="nav-home" title="Go home">&#8962;</button>
                </div>
        </body>
</html>
